name: CI + build (veraks-backend)

# Пуш в main → тесты. Тег v* / ручной запуск → тесты + сборка/пуш образа.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  IMAGE: avvolob/veraks

jobs:
  test:
    name: pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      # Юнит/интеграционные тесты используют фейки портов — БД/Redis не нужны.
      - name: pytest (без e2e)
        run: python -m pytest -q --ignore=tests/e2e
      - name: mypy
        run: python -m mypy app
      - name: ruff
        run: python -m ruff check app tests

  build:
    name: Build & push image
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - id: sha
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.sha }}
            ${{ env.IMAGE }}:latest
